<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calorie Calculator</title>

<meta name="google-site-verification" content="Nm3RVs0oPIOKXxBzIegKvGQlDoilSoAxvTxujh0ebrk" />
<meta name="description" content="Free calorie calculator to estimate TDEE, BMR, and macros." />

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:#aab4c5;
  --accent:#60a5fa;
  --radius:14px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
}

nav button{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
}
nav button:hover{color:#fff;}

.page{
  display:none;
  max-width:900px;
  margin:auto;
  padding:20px;
}
.page.active{display:block;}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

/* LEFT */
.left{
  flex:1;
  min-width:300px;
}

/* RIGHT FOOD PANEL */
.right{
  flex:1;
  min-width:260px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:15px;
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#111c2e;
  color:white;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--accent);
}

/* BUTTON */
button.calc{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#60a5fa,#7c3aed);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* RESULT */
.result{
  margin-top:15px;
  padding:15px;
  border-radius:var(--radius);
  background:#111c2e;   /* FIX: no more white */
  border:1px solid var(--border);
}

/* FOOD LIST */
h3{margin-bottom:10px;}

.food{
  font-size:13px;
  color:var(--muted);
  margin:4px 0;
}

.section{
  margin-bottom:15px;
}

</style>
</head>

<body>

<nav>
  <button onclick="show('calc')">Calculator</button>
  <button onclick="show('about')">About</button>
  <button onclick="show('privacy')">Privacy</button>
</nav>

<!-- CALC -->
<div id="calc" class="page active">

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2>🔥 Calorie Calculator</h2>

    <input id="age" placeholder="Age">
    <input id="weight" placeholder="Weight (kg)">
    <input id="height" placeholder="Height (cm)">

    <select id="activity">
      <option value="1.2">Sedentary</option>
      <option value="1.55">Moderate</option>
      <option value="1.725">Very active</option>
    </select>

    <select id="goal">
      <option value="0">Maintain</option>
      <option value="-500">Lose</option>
      <option value="300">Gain</option>
    </select>

    <button class="calc" onclick="calc()">Calculate</button>

    <div id="result"></div>

  </div>

  <!-- RIGHT FOOD PANEL -->
  <div class="right">
    <h3>🍽 Food suggestions</h3>

    <div class="section">
      <b>Protein</b>
      <div id="proteinFood"></div>
    </div>

    <div class="section">
      <b>Carbs</b>
      <div id="carbFood"></div>
    </div>

    <div class="section">
      <b>Fats</b>
      <div id="fatFood"></div>
    </div>
  </div>

</div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h2>About</h2>
  <p>This tool calculates calories and macros using scientific formulas.</p>
</div>

<!-- PRIVACY -->
<div id="privacy" class="page">
  <h2>Privacy</h2>
  <p>No data is stored.</p>
</div>

<script>
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function calc(){

  const age=+age.value;
  const weight=+document.getElementById("weight").value;
  const height=+document.getElementById("height").value;
  const activity=+document.getElementById("activity").value;
  const goal=+document.getElementById("goal").value;

  const bmr=10*weight+6.25*height-5*age+5;
  const tdee=bmr*activity;
  const target=tdee+goal;

  /* FIXED DARK RESULT */
  document.getElementById("result").innerHTML=`
    <div class="result">
      <h3>Results</h3>
      <p>Calories: <b>${Math.round(target)}</b></p>
      <p>BMR: <b>${Math.round(bmr)}</b></p>
      <p>TDEE: <b>${Math.round(tdee)}</b></p>
    </div>
  `;

  /* FOOD LOGIC */
  document.getElementById("proteinFood").innerHTML=`
    <p class="food">Chicken breast</p>
    <p class="food">Eggs</p>
    <p class="food">Greek yogurt</p>
    <p class="food">Tuna</p>
  `;

  document.getElementById("carbFood").innerHTML=`
    <p class="food">Rice</p>
    <p class="food">Oats</p>
    <p class="food">Potatoes</p>
    <p class="food">Bananas</p>
  `;

  document.getElementById("fatFood").innerHTML=`
    <p class="food">Olive oil</p>
    <p class="food">Avocado</p>
    <p class="food">Nuts</p>
    <p class="food">Peanut butter</p>
  `;
}
</script>

</body>
</html>
