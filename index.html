<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calorie Calculator</title>

<meta name="google-site-verification" content="Nm3RVs0oPIOKXxBzIegKvGQlDoilSoAxvTxujh0ebrk" />
<meta name="description" content="Free calorie calculator to estimate TDEE, BMR, and macros for weight loss, maintenance, and muscle gain." />

<style>
:root {
  --color-background-primary: #0b1220;
  --color-background-secondary: #111c2e;
  --color-text-primary: #f8fafc;
  --color-text-secondary: #cbd5e1;
  --color-text-tertiary: #94a3b8;
  --accent: #60a5fa;
  --border-radius-md: 12px;
  --font-sans: ui-sans-serif, system-ui;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-sans);
  background: #0b1220;
  color: var(--color-text-primary);
}

nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  border-bottom:1px solid #1a2433;
}

nav button {
  background:none;
  border:none;
  color:var(--color-text-secondary);
  cursor:pointer;
}

nav button:hover {
  color:white;
}

.page { display:none; padding:20px; max-width:700px; margin:auto; }
.page.active { display:block; }

/* calculator styles */
input, select {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #1a2433;
  background:#111c2e;
  color:white;
}

button.calc {
  margin-top:10px;
  width:100%;
  padding:10px;
  background:linear-gradient(135deg,#60a5fa,#3b82f6);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.card {
  background:#111c2e;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<nav>
  <button onclick="showPage('calc')">Calculator</button>
  <button onclick="showPage('about')">About</button>
  <button onclick="showPage('privacy')">Privacy Policy</button>
</nav>

<!-- CALCULATOR PAGE -->
<div id="calc" class="page active">

  <h1>Calorie Calculator</h1>

  <input id="age" placeholder="Age">
  <input id="weight" placeholder="Weight (kg)">
  <input id="height" placeholder="Height (cm)">

  <select id="activity">
    <option value="1.2">Sedentary</option>
    <option value="1.55">Moderate</option>
    <option value="1.725">Very active</option>
  </select>

  <select id="goal">
    <option value="0">Maintain</option>
    <option value="-500">Lose</option>
    <option value="300">Gain</option>
  </select>

  <button class="calc" onclick="calc()">Calculate</button>

  <div id="result"></div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h1>About</h1>
  <p>This tool helps you calculate daily calories, TDEE, and macros using scientific formulas.</p>
</div>

<!-- PRIVACY -->
<div id="privacy" class="page">
  <h1>Privacy Policy</h1>
  <p>This website does not collect personal data. All calculations are done locally in your browser.</p>
</div>

<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function calc(){
  const age = +document.getElementById("age").value;
  const weight = +document.getElementById("weight").value;
  const height = +document.getElementById("height").value;
  const activity = +document.getElementById("activity").value;
  const goal = +document.getElementById("goal").value;

  const bmr = 10*weight + 6.25*height - 5*age + 5;
  const tdee = bmr * activity;
  const target = tdee + goal;

  document.getElementById("result").innerHTML = `
    <div class="card">
      <h3>Result</h3>
      <p>Calories: ${Math.round(target)}</p>
      <p>BMR: ${Math.round(bmr)}</p>
      <p>TDEE: ${Math.round(tdee)}</p>
    </div>
  `;
}
</script>

</body>
</html>
