<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calorie Calculator</title>

<meta name="google-site-verification" content="Nm3RVs0oPIOKXxBzIegKvGQlDoilSoAxvTxujh0ebrk" />

<style>
:root{
  --bg:#0b1220;
  --card:#111c2e;
  --border:#1f2a3a;
  --text:#ffffff;
  --muted:#aab4c5;
  --accent:#60a5fa;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:system-ui, Arial;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  border-bottom:1px solid var(--border);
}

nav button{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
}

nav button:hover{
  color:white;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
  max-width:900px;
  margin:auto;
  padding:20px;
  flex-wrap:wrap;
}

.left, .right{
  flex:1;
  min-width:280px;
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:white;
}

button.calc{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#60a5fa,#3b82f6);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* RESULT CARD */
.result{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  background:var(--card);
  border:1px solid var(--border);
}

/* FOOD PANEL */
.right{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:15px;
}

.food{
  color:var(--muted);
  font-size:13px;
  margin:4px 0;
}

h2,h3{
  margin-bottom:10px;
}
</style>
</head>

<body>

<nav>
  <button onclick="show('calc')">Calculator</button>
</nav>

<div id="calc">

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2>🔥 Calorie Calculator</h2>

    <input id="age" placeholder="Age">
    <input id="weight" placeholder="Weight (kg)">
    <input id="height" placeholder="Height (cm)">

    <select id="activity">
      <option value="1.2">Sedentary</option>
      <option value="1.55">Moderate</option>
      <option value="1.725">Very active</option>
    </select>

    <select id="goal">
      <option value="0">Maintain</option>
      <option value="-500">Lose</option>
      <option value="300">Gain</option>
    </select>

    <button class="calc" onclick="calc()">Calculate</button>

    <div id="result"></div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>🍽 Foods to eat</h3>

    <b>Protein</b>
    <p class="food">Chicken breast</p>
    <p class="food">Eggs</p>
    <p class="food">Greek yogurt</p>
    <p class="food">Tuna</p>

    <br>

    <b>Carbs</b>
    <p class="food">Rice</p>
    <p class="food">Oats</p>
    <p class="food">Potatoes</p>
    <p class="food">Bananas</p>

    <br>

    <b>Fats</b>
    <p class="food">Olive oil</p>
    <p class="food">Avocado</p>
    <p class="food">Nuts</p>
    <p class="food">Peanut butter</p>
  </div>

</div>

</div>

<script>
function show(){
  // only 1 page, safe
}

function calc(){

  const age = Number(document.getElementById("age").value);
  const weight = Number(document.getElementById("weight").value);
  const height = Number(document.getElementById("height").value);
  const activity = Number(document.getElementById("activity").value);
  const goal = Number(document.getElementById("goal").value);

  if(!age || !weight || !height){
    alert("Fill all fields");
    return;
  }

  const bmr = 10*weight + 6.25*height - 5*age + 5;
  const tdee = bmr * activity;
  const target = tdee + goal;

  document.getElementById("result").innerHTML = `
    <div class="result">
      <h3>Results</h3>
      <p>Calories: <b>${Math.round(target)}</b></p>
      <p>BMR: <b>${Math.round(bmr)}</b></p>
      <p>TDEE: <b>${Math.round(tdee)}</b></p>
    </div>
  `;
}
</script>

</body>
</html>
