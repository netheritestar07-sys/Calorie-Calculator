<script>
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function calc(){

  const age = +document.getElementById("age").value;
  const weight = +document.getElementById("weight").value;
  const height = +document.getElementById("height").value;
  const activity = +document.getElementById("activity").value;
  const goal = +document.getElementById("goal").value;

  const bmr = 10*weight + 6.25*height - 5*age + 5;
  const tdee = bmr * activity;
  const target = tdee + goal;

  document.getElementById("result").innerHTML = `
    <div class="result">
      <h3>Results</h3>
      <p>Calories: <b>${Math.round(target)}</b></p>
      <p>BMR: <b>${Math.round(bmr)}</b></p>
      <p>TDEE: <b>${Math.round(tdee)}</b></p>
    </div>
  `;

  document.getElementById("proteinFood").innerHTML = `
    <p class="food">Chicken breast</p>
    <p class="food">Eggs</p>
    <p class="food">Greek yogurt</p>
    <p class="food">Tuna</p>
  `;

  document.getElementById("carbFood").innerHTML = `
    <p class="food">Rice</p>
    <p class="food">Oats</p>
    <p class="food">Potatoes</p>
    <p class="food">Bananas</p>
  `;

  document.getElementById("fatFood").innerHTML = `
    <p class="food">Olive oil</p>
    <p class="food">Avocado</p>
    <p class="food">Nuts</p>
    <p class="food">Peanut butter</p>
  `;
}
</script>
