<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: black;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* motivational background */
  background: url("https://images.unsplash.com/photo-1506784365847-bbad939e9335") no-repeat center center/cover;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.75);
}

.container {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 700px;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  margin-bottom: 5px;
}

p {
  color: #444;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.8;
}

.result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h2>🔥 Calorie Calculator</h2>
  <p>Stay consistent. Build your dream body.</p>

  <input id="weight" placeholder="Weight (kg)">
  <input id="height" placeholder="Height (cm)">
  <input id="age" placeholder="Age">

  <select id="activity">
    <option value="1.2">Sedentary</option>
    <option value="1.375">Lightly active</option>
    <option value="1.55" selected>Moderate</option>
    <option value="1.725">Very active</option>
  </select>

  <button onclick="calc()">Calculate</button>

  <div class="result" id="result"></div>
</div>

<script>
function calc() {
  let w = document.getElementById("weight").value;
  let h = document.getElementById("height").value;
  let a = document.getElementById("age").value;
  let activity = document.getElementById("activity").value;

  let bmr = 10*w + 6.25*h - 5*a + 5;
  let tdee = bmr * activity;

  document.getElementById("result").innerHTML =
    "🔥 Your daily calories: " + Math.round(tdee) + " kcal";
}
</script>

</body>
</html>
